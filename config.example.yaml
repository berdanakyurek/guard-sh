# guard-sh configuration example
# Copy this file to ~/.config/guard-sh/config.yaml and fill in your values.
# Or add providers interactively with: guard-sh provider add

# Providers are tried in this order. If one fails (rate limit, etc.), the next is used.
provider_order:
  - openai
  - gemini
  - deepseek
  - claude

providers:
  openai:
    api_key: YOUR_OPENAI_KEY
    model: gpt-4o-mini                    # optional, this is the default

  gemini:
    api_key: YOUR_GEMINI_KEY
    model: gemini-3.1-flash-lite-preview  # optional, this is the default

  deepseek:
    api_key: YOUR_DEEPSEEK_KEY
    model: deepseek-chat                  # optional, this is the default

  claude:
    api_key: YOUR_ANTHROPIC_KEY
    model: claude-haiku-4-5-20251001      # optional, this is the default

# How long to wait for an LLM response, in seconds. Defaults to 10 if not set.
timeout_seconds: 10

# Cache LLM responses to avoid repeated API calls for the same command.
cache_enabled: true

# Maximum number of cached responses to keep. Oldest entries are evicted when full.
cache_max_size: 1000

# Commands that are always considered safe — API is never called for these.
# Only the base command name is needed (e.g. "ls" covers "ls -la", "ls /tmp", etc.).
# If multiple commands are chained (&&, ||, ;, |), ALL parts must be whitelisted.
command_whitelist:
  - ls
  - cat
  - echo
  - pwd
  - cd
  - clear
  - man
  - help
  - history
  - which
  - whoami
  - date
  - uptime
